name: Build and Lint

on:
  push:
    branches: [ develop, canary, release ]
  pull_request:
    branches: [ develop, canary, release ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v1
      with:
        version: '4.4.1'
        use-dotnet: true

    - name: Install Godot export templates
      run: |
        mkdir -p ~/.local/share/godot/export_templates/4.4.1.stable.mono
        cd ~/.local/share/godot/export_templates/4.4.1.stable.mono
        wget https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_mono_export_templates.tpz
        unzip Godot_v4.4.1-stable_mono_export_templates.tpz
        mv templates/* .
        rm -rf templates Godot_v4.4.1-stable_mono_export_templates.tpz

    - name: Check if C# project exists
      id: check_csharp
      run: |
        if find . -name "*.csproj" -o -name "*.sln" | grep -q .; then
          echo "has_csharp=true" >> $GITHUB_OUTPUT
        else
          echo "has_csharp=false" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      if: steps.check_csharp.outputs.has_csharp == 'true'
      run: dotnet restore

    - name: Check code formatting
      if: steps.check_csharp.outputs.has_csharp == 'true'
      run: dotnet format --verify-no-changes --verbosity diagnostic --workspace "Ashes of Velsingrad.csproj"

    - name: Build project
      if: steps.check_csharp.outputs.has_csharp == 'true'
      run: dotnet build --no-restore --configuration Release

    - name: Import project assets
      run: |
        godot --headless --import --quit

    - name: Export project (Windows)
      run: |
        mkdir -p builds/windows
        # Temporarily disabled until export templates are properly configured
        # godot --headless --export-release "Windows Desktop" builds/windows/ashes-of-velsingrad.exe
        echo "Export step skipped - no export templates available in CI"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ashes-of-velsingrad-builds
        path: builds/
