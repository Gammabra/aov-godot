name: Tests and Coverage

on:
  push:
    branches: [develop, canary, release, chore/test-coverage]
    paths-ignore:
      - "**.md"
      - "documentation/**"
  pull_request:
    branches: [develop, canary, release]
    paths-ignore:
      - "**.md"
      - "documentation/**"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-coverage:
    name: "Unit & Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      checks: write
      contents: write
      pull-requests: write
      statuses: write

    strategy:
      matrix:
        dotnet-version: ["9.0.x"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      # --- 1. PURE C# UNIT TESTS & COVERAGE ---
      - name: Run .NET Unit Tests & Collect Coverage
        run: >
          dotnet test AshesofVelsingrad.Core.Tests/AshesofVelsingrad.Core.Tests.csproj
          --configuration Release 
          --no-restore 
          --collect:"XPlat Code Coverage" 
          --results-directory ./TestResults 
          --logger "trx;LogFileName=dotnet_results.trx"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=90

      - name: Upload .NET Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-coverage-report
          path: ./TestResults/**/coverage.cobertura.xml

      - name: Upload .NET Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: ./TestResults/dotnet_results.trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/**/coverage.cobertura.xml
          flags: core-logic 
          name: core-tests
          fail_ci_if_error: true

      # --- 2. GODOT INTEGRATION TESTS ---
      - name: Run GdUnit4 Integration Tests
        uses: MikeSchulze/gdunit4-action@v1
        with:
          godot-version: "4.6"
          godot-net: true
          dotnet-version: ${{ matrix.dotnet-version }}
          # Assuming you moved your GdUnit tests to an integration folder. Adjust path if needed.
          paths: "res://AshesofVelsingrad/integration_tests" 
          version: "latest"
          arguments: "--verbose --continue-on-failed --settings=res://AshesofVelsingrad/integration_tests/.runsettings"
          report-name: gdunit_report.xml

      - name: Upload GdUnit4 Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gdunit-test-results
          path: gdunit_report.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET & GdUnit4 Tests
          path: '**/TestResults/*.trx,**/gdunit_report.xml'
          reporter: dotnet-trx

      # --- 3. GENERATE HTML REPORT ---
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Debug - List Test Results
        run: ls -R ./TestResults

      - name: Generate HTML Report
        run: >
          reportgenerator 
          "-reports:TestResults/**/coverage.cobertura.xml" 
          "-targetdir:TestResults/CoverageHTML" 
          -reporttypes:Html

      - name: Upload HTML Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-site
          path: ./TestResults/CoverageHTML