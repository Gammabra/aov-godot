name: Build DocFX Documentation

on:
  # Trigger this workflow AFTER "Tests and Coverage" completes
  workflow_run:
    workflows: ["Tests and Coverage"] # Must match the 'name:' in ci.yml exactly
    types:
      - completed
    branches: [develop, canary, release]
  workflow_dispatch:

jobs:
  build-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    outputs:
      site-path: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 1. Download the Coverage HTML from the other workflow
      # Note: This works best if you merge the jobs or ensure the test workflow finished
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-html-site
          path: coverage # Put it inside the docfx source folder
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build project
        run: dotnet build

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Generate Documentation
        run: docfx docfx.json

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: docfx-site
          path: documentation/_site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push to gh-pages
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docfx-site
          path: site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
