name: Sync to Epitech Mirror Repo
on:
  push:
    branches:
      - release
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout first repository (aov-godot)
        uses: actions/checkout@v4
      - name: Clone second repository (aov-epitech)
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Gammabra/aov-epitech.git second-repo
      - name: Copy content
        run: |
          rm -rf second-repo/game/aov-godot/*
          mkdir -p second-repo/game/aov-godot
          cp -r $(ls -A | grep -v "second-repo" | grep -v "\.git" | grep -v "\.github") second-repo/game/aov-godot/
          cd second-repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Sync from aov-godot repo" || echo "No changes to commit"
          git push origin main
