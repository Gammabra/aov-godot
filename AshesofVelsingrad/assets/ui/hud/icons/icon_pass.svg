  <g>
    <!-- Frame -->
    <rect x="14" y="6" width="36" height="3" rx="1"/>
    <rect x="14" y="55" width="36" height="3" rx="1"/>
    <!-- Glass outline as triangles -->
    <polygon points="18,9 46,9 34,30 30,30" opacity="0.85"/>
    <polygon points="30,34 34,34 46,55 18,55" opacity="0.85"/>
